<!DOCTYPE html>
<html lang="en">
<head>
  {% include "_google_analytics.html" %}
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  {% include "_seo_head.html" %}
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('/static/back5.jpg') center/cover no-repeat fixed;
    }
    .container {
      width: min(420px, 92vw);
      background: rgba(255, 255, 255, 0.98);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }
    h2 { text-align: center; margin-bottom: 12px; }
    .subtitle { text-align: center; color: #475569; margin-bottom: 20px; line-height: 1.5; }
    label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
    input {
      width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%; padding: 12px; border: none; background: #667eea; color: white;
      border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 4px;
    }
    .btn:disabled { opacity: 0.7; cursor: wait; }
    .status { margin-top: 14px; text-align: center; font-size: 14px; display: none; white-space: pre-line; }
    .success { color: #047857; }
    .error { color: #b91c1c; }
    .extra { margin-top: 16px; text-align: center; font-size: 14px; }
    .extra a { color: #667eea; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter the verification code from your email and choose a new password.</p>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" readonly />
    <label for="code">Verification Code</label>
    <input type="text" id="code" placeholder="Enter the code from your email" />
    <label for="password">New Password</label>
    <input type="password" id="password" placeholder="Enter a new password" />
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm your new password" />
    <button class="btn" id="saveBtn" onclick="resetPassword()">Save New Password</button>
    <div class="status" id="statusMessage"></div>
    <div class="extra">
      <p><a href="/login">Back to login</a></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');
      if (email) {
        document.getElementById('email').value = email;
      }
    });

    async function resetPassword() {
      const email = document.getElementById('email').value.trim();
      const code = document.getElementById('code').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const saveBtn = document.getElementById('saveBtn');
      const statusMessage = document.getElementById('statusMessage');

      if (!email.includes('@')) {
        statusMessage.textContent = 'Please enter a valid email.';
        statusMessage.className = 'status error';
        statusMessage.style.display = 'block';
        return;
      }

      if (!code) {
        statusMessage.textContent = 'Please enter the verification code.';
        statusMessage.className = 'status error';
        statusMessage.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        statusMessage.textContent = 'Password must be at least 6 characters.';
        statusMessage.className = 'status error';
        statusMessage.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        statusMessage.textContent = 'Passwords do not match.';
        statusMessage.className = 'status error';
        statusMessage.style.display = 'block';
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      statusMessage.style.display = 'none';

      try {
        const response = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code, password })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || 'Could not reset password');
        }

        statusMessage.textContent = 'Password reset successful. Redirecting to login...';
        statusMessage.className = 'status success';
        statusMessage.style.display = 'block';
        setTimeout(() => {
          window.location.href = '/login';
        }, 1400);
      } catch (error) {
        statusMessage.textContent = error.message;
        statusMessage.className = 'status error';
        statusMessage.style.display = 'block';
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save New Password';
      }
    }
  </script>
</body>
</html>
